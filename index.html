<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My App Launcher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-0: #020917;
    --bg-1: #071228;
    --bg-2: #0c1d3d;
    --glass: rgba(255,255,255,0.055);
    --glass-border: rgba(255,255,255,0.10);
    --glass-hover: rgba(255,255,255,0.09);
    --accent: #4f8ef7;
    --accent2: #7c5cf6;
    --accent3: #00d4c8;
    --accent-glow: rgba(79,142,247,0.25);
    --text-1: #e8f2ff;
    --text-2: #93aed4;
    --text-3: #4e6a91;
    --danger: #f75f6b;
    --success: #3dd68c;
    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 24px;
    --tab-h: 72px;
    --header-h: 64px;
  }

  html, body {
    height: 100%;
    background: var(--bg-0);
    color: var(--text-1);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ── Aurora background ── */
  #aurora {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .aurora-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.18;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .a1 { width: 600px; height: 500px; background: #1a3a8f; top: -150px; left: -100px; animation-duration: 20s; }
  .a2 { width: 500px; height: 400px; background: #3b1a7a; top: 100px; right: -120px; animation-duration: 25s; animation-delay: -5s; }
  .a3 { width: 400px; height: 350px; background: #0e4d6e; bottom: 80px; left: 50px; animation-duration: 22s; animation-delay: -10s; }
  .a4 { width: 300px; height: 300px; background: #1a5c4f; bottom: -50px; right: 80px; animation-duration: 28s; animation-delay: -8s; }
  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-20px) scale(1.05); }
    66% { transform: translate(-20px,25px) scale(0.95); }
    100% { transform: translate(15px,-10px) scale(1.03); }
  }

  /* ── Layout ── */
  #app {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ── Header ── */
  #header {
    height: var(--header-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(2,9,23,0.7);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }
  .header-title {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, #e8f2ff, #7eb6ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.3px;
  }
  .header-count {
    font-size: 12px; color: var(--text-3);
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 4px 10px; border-radius: 20px;
  }

  /* ── Main scroll area ── */
  #main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding-bottom: 16px;
  }
  #main::-webkit-scrollbar { width: 4px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

  /* ── Bottom tab bar ── */
  #tabbar {
    height: var(--tab-h);
    flex-shrink: 0;
    display: flex;
    background: rgba(7,18,40,0.85);
    backdrop-filter: blur(24px);
    border-top: 1px solid var(--glass-border);
    padding: 0 16px;
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    cursor: pointer; border: none; background: none;
    color: var(--text-3); transition: color 0.2s;
    position: relative; padding: 0;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .tab-label { font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .tab-indicator {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 32px; height: 2px; border-radius: 0 0 4px 4px;
    background: var(--accent);
    opacity: 0; transition: opacity 0.2s;
    box-shadow: 0 0 12px var(--accent);
  }
  .tab-btn.active .tab-indicator { opacity: 1; }

  /* ── Section panels ── */
  .panel { display: none; animation: fadeIn 0.25s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Category strip ── */
  .cat-strip {
    display: flex; gap: 8px;
    padding: 14px 16px 10px;
    overflow-x: auto; scrollbar-width: none;
  }
  .cat-strip::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0;
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--text-2); cursor: pointer; transition: all 0.18s;
    white-space: nowrap;
  }
  .cat-chip:hover { background: var(--glass-hover); color: var(--text-1); }
  .cat-chip.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 18px var(--accent-glow);
  }

  /* ── Category section ── */
  .cat-section { padding: 6px 16px 10px; }
  .cat-heading {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text-3);
    margin-bottom: 14px; padding-left: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .cat-heading::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--glass-border), transparent);
  }

  /* ── App grid ── */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
    gap: 20px 10px;
  }

  /* ── App item ── */
  .app-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    cursor: pointer; text-decoration: none;
  }
  .app-icon-wrap {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    backdrop-filter: blur(12px);
  }
  .app-item:hover .app-icon-wrap {
    transform: scale(1.08) translateY(-2px);
    box-shadow: 0 8px 30px rgba(79,142,247,0.22), 0 0 0 1px rgba(79,142,247,0.3);
    border-color: rgba(79,142,247,0.4);
  }
  .app-item:active .app-icon-wrap { transform: scale(0.96); }
  .app-icon-wrap img {
    width: 36px; height: 36px; border-radius: 8px;
    object-fit: contain;
  }
  .app-icon-emoji { font-size: 28px; line-height: 1; }
  .app-icon-letter {
    font-size: 22px; font-weight: 700;
    color: #fff;
    text-transform: uppercase;
  }
  .app-icon-bg {
    position: absolute; inset: 0; border-radius: 50%;
    opacity: 0.55;
  }
  .app-name {
    font-size: 11px; color: var(--text-2); text-align: center;
    max-width: 76px; word-break: break-word;
    line-height: 1.3;
  }

  /* ── Empty state ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 20px; gap: 14px; text-align: center;
  }
  .empty-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--glass); border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text-1); }
  .empty-sub { font-size: 13px; color: var(--text-3); max-width: 240px; line-height: 1.6; }

  /* ── Settings panel ── */
  .settings-header {
    padding: 18px 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .settings-title { font-size: 15px; font-weight: 700; color: var(--text-1); }

  /* ── FAB / Add button ── */
  .fab {
    position: fixed; bottom: calc(var(--tab-h) + 16px); right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(79,142,247,0.45);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 50;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(79,142,247,0.6); }
  .fab:active { transform: scale(0.95); }
  .fab svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Settings app list ── */
  .sett-app-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .sett-app-item:hover { background: var(--glass); }
  .sett-icon-sm {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    background: var(--glass); border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .sett-icon-sm img { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; }
  .sett-icon-sm .app-icon-emoji { font-size: 20px; }
  .sett-icon-sm .app-icon-letter { font-size: 16px; }
  .sett-icon-sm .app-icon-bg { border-radius: 50%; }
  .sett-info { flex: 1; min-width: 0; }
  .sett-name { font-size: 14px; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sett-cat { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .sett-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--glass-hover); }
  .icon-btn.del:hover { background: rgba(247,95,107,0.15); border-color: var(--danger); }
  .icon-btn svg { width: 15px; height: 15px; stroke: var(--text-2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .icon-btn.del svg { stroke: var(--danger); }

  /* ── Categories settings ── */
  .sett-section {
    margin: 0 16px 6px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .sett-section-head {
    padding: 10px 14px 8px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text-3);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .cat-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-row-name { flex: 1; font-size: 13px; color: var(--text-1); }
  .cat-row-count { font-size: 11px; color: var(--text-3); }

  /* ── Modal overlay ── */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(2,9,23,0.75);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    background: #0c1d3d;
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    transform: translateY(40px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  .overlay.open .modal { transform: translateY(0); }
  .modal-drag { width: 40px; height: 4px; border-radius: 2px; background: var(--glass-border); margin: 12px auto 8px; }
  .modal-title {
    font-size: 17px; font-weight: 700; color: var(--text-1);
    padding: 4px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  /* ── Form elements ── */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-2); letter-spacing: 0.3px; }
  .form-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text-1); font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .form-input::placeholder { color: var(--text-3); }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
  }
  .form-input option { background: #0c1d3d; color: var(--text-1); }

  /* ── Icon preview area ── */
  .icon-preview-row { display: flex; align-items: center; gap: 14px; }
  .icon-preview-circle {
    width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
    background: var(--glass); border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
    font-size: 26px;
  }
  .icon-preview-circle .app-icon-bg { border-radius: 50%; }
  .icon-preview-info { flex: 1; }
  .icon-preview-hint { font-size: 12px; color: var(--text-3); line-height: 1.5; }
  .icon-type-toggle { display: flex; gap: 8px; flex-wrap: wrap; }
  .icon-type-btn {
    padding: 6px 12px; border-radius: 20px; font-size: 12px;
    border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--text-2);
    cursor: pointer; transition: all 0.15s;
  }
  .icon-type-btn.active {
    background: rgba(79,142,247,0.2); border-color: var(--accent); color: var(--accent);
  }

  /* ── Emoji picker strip ── */
  .emoji-strip { display: flex; flex-wrap: wrap; gap: 6px; }
  .emoji-opt {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--glass); border: 1px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; transition: all 0.15s;
  }
  .emoji-opt:hover { background: var(--glass-hover); }
  .emoji-opt.selected { border-color: var(--accent); background: rgba(79,142,247,0.15); }

  /* ── Color picker for letter icon ── */
  .color-strip { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-opt {
    width: 28px; height: 28px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-opt:hover { transform: scale(1.15); }
  .color-opt.selected { border-color: #fff; }

  /* ── Modal footer buttons ── */
  .modal-footer { display: flex; gap: 10px; padding: 0 20px 20px; }
  .btn-cancel {
    flex: 1; padding: 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border); background: var(--glass);
    color: var(--text-2); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--glass-hover); color: var(--text-1); }
  .btn-save {
    flex: 2; padding: 12px; border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .btn-save:hover { box-shadow: 0 6px 28px rgba(79,142,247,0.55); transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  /* ── Category new input ── */
  .cat-new-row { display: flex; gap: 8px; }
  .cat-new-row .form-input { flex: 1; }
  .btn-add-cat {
    padding: 0 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--accent); background: rgba(79,142,247,0.12);
    color: var(--accent); font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .btn-add-cat:hover { background: rgba(79,142,247,0.22); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: calc(var(--tab-h) + 12px); left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(61,214,140,0.15); border: 1px solid var(--success);
    color: var(--success); padding: 8px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    z-index: 200; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Favicon status ── */
  .favicon-status {
    font-size: 11px; color: var(--text-3);
    display: flex; align-items: center; gap: 5px;
  }
  .favicon-status.ok { color: var(--success); }
  .favicon-status.err { color: var(--danger); }

  /* Responsive ── wider screens */
  @media (min-width: 500px) {
    .app-grid { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); }
  }
</style>
</head>
<body>

<div id="aurora">
  <div class="aurora-blob a1"></div>
  <div class="aurora-blob a2"></div>
  <div class="aurora-blob a3"></div>
  <div class="aurora-blob a4"></div>
</div>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="header-title">🚀 My App Launcher</div>
    <div class="header-count" id="totalCount">0 Apps</div>
  </div>

  <!-- Main scrollable -->
  <div id="main">
    <!-- Applications panel -->
    <div id="panel-apps" class="panel active">
      <div class="cat-strip" id="catStrip"></div>
      <div id="appsContent"></div>
    </div>

    <!-- Settings panel -->
    <div id="panel-settings" class="panel">
      <!-- Category management -->
      <div style="padding: 16px 16px 8px;">
        <div class="settings-title" style="margin-bottom:12px">ক্যাটাগরি</div>
        <div class="cat-new-row">
          <input class="form-input" id="newCatInput" placeholder="নতুন ক্যাটাগরি নাম লিখুন..." />
          <button class="btn-add-cat" onclick="addCategory()">+ যোগ করুন</button>
        </div>
        <div class="sett-section" style="margin-top:10px">
          <div class="sett-section-head">সকল ক্যাটাগরি</div>
          <div id="catList"></div>
        </div>
      </div>

      <!-- App list -->
      <div style="padding: 8px 16px 4px;">
        <div class="settings-title" style="margin-bottom:8px">সকল অ্যাপ</div>
      </div>
      <div id="settAppList"></div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabBtn" onclick="openModal()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- Tab bar -->
  <div id="tabbar">
    <button class="tab-btn active" id="tab-apps" onclick="switchTab('apps')">
      <div class="tab-indicator"></div>
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span class="tab-label">Applications</span>
    </button>
    <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">
      <div class="tab-indicator"></div>
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span class="tab-label">Settings</span>
    </button>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" id="modalTitle">নতুন অ্যাপ যোগ করুন</div>
    <div class="modal-body">

      <!-- App name -->
      <div class="form-group">
        <label class="form-label">অ্যাপের নাম</label>
        <input class="form-input" id="inp-name" placeholder="যেমন: My Portfolio" />
      </div>

      <!-- App URL -->
      <div class="form-group">
        <label class="form-label">ওয়েব অ্যাপ লিংক (URL)</label>
        <input class="form-input" id="inp-url" placeholder="https://myapp.vercel.app" oninput="onUrlChange(this.value)" />
        <div class="favicon-status" id="faviconStatus"></div>
      </div>

      <!-- Category -->
      <div class="form-group">
        <label class="form-label">ক্যাটাগরি</label>
        <select class="form-input" id="inp-cat"></select>
      </div>

      <!-- Icon section -->
      <div class="form-group">
        <label class="form-label">আইকন টাইপ</label>
        <div class="icon-type-toggle">
          <button class="icon-type-btn active" onclick="setIconType('favicon')" id="itype-favicon">🌐 Favicon (Auto)</button>
          <button class="icon-type-btn" onclick="setIconType('emoji')" id="itype-emoji">😀 Emoji</button>
          <button class="icon-type-btn" onclick="setIconType('letter')" id="itype-letter">🔤 Letter</button>
        </div>
      </div>

      <!-- Icon preview -->
      <div class="icon-preview-row">
        <div class="icon-preview-circle" id="iconPreview"></div>
        <div class="icon-preview-info">
          <div class="icon-preview-hint" id="iconHint">URL দিলে favicon অটো লোড হবে। না পেলে প্রথম অক্ষর দেখাবে।</div>
        </div>
      </div>

      <!-- Emoji picker (hidden by default) -->
      <div class="form-group" id="emojiSection" style="display:none">
        <label class="form-label">Emoji বেছে নিন</label>
        <div class="emoji-strip" id="emojiStrip"></div>
      </div>

      <!-- Letter color picker (hidden by default) -->
      <div class="form-group" id="colorSection" style="display:none">
        <label class="form-label">রঙ বেছে নিন</label>
        <div class="color-strip" id="colorStrip"></div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">বাতিল</button>
      <button class="btn-save" onclick="saveApp()">✓ সংরক্ষণ করুন</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ─── Data ─── */
const STORAGE_KEY = 'launcher_v2';
const EMOJIS = ['🚀','🌐','💻','📱','🎨','🛠️','📊','🔗','⚡','🎯','🔥','💡','🌍','📝','🎵','📷','🎮','🛡️','📡','🌈','💎','🔑','🏆','📦','🔧','🌟','📌','🗂️','🔍','💬','🤖','🎪','🌺','🧩','📈','🎁','🔐','🌙','☁️','🏗️'];
const COLORS = ['#3b82f6','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#84cc16','#f97316','#6366f1','#14b8a6','#a855f7'];

let data = load();
let editingId = null;
let currentCatFilter = 'all';
let currentIconType = 'favicon';
let selectedEmoji = '🚀';
let selectedColor = COLORS[0];
let faviconUrl = '';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    categories: ['Education','Islamic Tools','E-Commerce','Utilities','Portfolio'],
    apps: []
  };
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ─── Tab switch ─── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'settings') { renderSettings(); document.getElementById('fabBtn').style.display = 'flex'; }
  else { renderApps(); document.getElementById('fabBtn').style.display = 'flex'; }
}

/* ─── Icon HTML helper ─── */
function iconHtml(app, size = 'normal') {
  const imgSize = size === 'sm' ? 24 : 36;
  const emojiSize = size === 'sm' ? '20px' : '28px';
  const letterSize = size === 'sm' ? '16px' : '22px';

  if (app.iconType === 'favicon' && app.faviconUrl) {
    return `<img src="${app.faviconUrl}" width="${imgSize}" height="${imgSize}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
            <span class="app-icon-letter" style="display:none;font-size:${letterSize}">${(app.name||'A')[0].toUpperCase()}</span>`;
  }
  if (app.iconType === 'emoji' && app.emoji) {
    return `<span class="app-icon-emoji" style="font-size:${emojiSize}">${app.emoji}</span>`;
  }
  const col = app.color || COLORS[0];
  return `<div class="app-icon-bg" style="background:linear-gradient(135deg,${col}88,${col}44)"></div>
          <span class="app-icon-letter" style="font-size:${letterSize}">${(app.name||'A')[0].toUpperCase()}</span>`;
}

/* ─── Render apps ─── */
function renderApps() {
  const total = data.apps.length;
  document.getElementById('totalCount').textContent = total + ' App' + (total !== 1 ? 's' : '');

  // Cat strip
  const strip = document.getElementById('catStrip');
  const usedCats = [...new Set(data.apps.map(a => a.category))].filter(Boolean);
  let html = `<div class="cat-chip ${currentCatFilter==='all'?'active':''}" onclick="filterCat('all')">সব</div>`;
  usedCats.forEach(c => {
    html += `<div class="cat-chip ${currentCatFilter===c?'active':''}" onclick="filterCat('${c.replace(/'/g,"\\'")}')">${c}</div>`;
  });
  strip.innerHTML = html;

  // Group by category
  const filtered = currentCatFilter === 'all' ? data.apps : data.apps.filter(a => a.category === currentCatFilter);
  const content = document.getElementById('appsContent');

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">কোনো অ্যাপ নেই</div>
      <div class="empty-sub">নিচের + বাটনে ক্লিক করে আপনার প্রথম ওয়েব অ্যাপ যোগ করুন</div>
    </div>`;
    return;
  }

  const groups = {};
  filtered.forEach(app => {
    const k = app.category || 'Other';
    if (!groups[k]) groups[k] = [];
    groups[k].push(app);
  });

  let out = '';
  Object.keys(groups).forEach(cat => {
    out += `<div class="cat-section">
      <div class="cat-heading">${cat}</div>
      <div class="app-grid">`;
    groups[cat].forEach(app => {
      out += `<a class="app-item" href="${escHtml(app.url)}" target="_blank" rel="noopener">
        <div class="app-icon-wrap">${iconHtml(app)}</div>
        <span class="app-name">${escHtml(app.name)}</span>
      </a>`;
    });
    out += `</div></div>`;
  });
  content.innerHTML = out;
}

function filterCat(cat) {
  currentCatFilter = cat;
  renderApps();
}

/* ─── Render settings ─── */
function renderSettings() {
  // Cat list
  const catList = document.getElementById('catList');
  const colors = ['#3b82f6','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#84cc16'];
  if (data.categories.length === 0) {
    catList.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--text-3)">কোনো ক্যাটাগরি নেই</div>';
  } else {
    catList.innerHTML = data.categories.map((c,i) => {
      const count = data.apps.filter(a => a.category === c).length;
      return `<div class="cat-row">
        <div class="cat-dot" style="background:${colors[i%colors.length]}"></div>
        <span class="cat-row-name">${escHtml(c)}</span>
        <span class="cat-row-count">${count} টি</span>
        <button class="icon-btn del" onclick="deleteCat('${c.replace(/'/g,"\\'")}')">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>`;
    }).join('');
  }

  // App list
  const appList = document.getElementById('settAppList');
  if (data.apps.length === 0) {
    appList.innerHTML = `<div class="empty-state" style="padding:40px 20px">
      <div class="empty-icon">📋</div>
      <div class="empty-title">কোনো অ্যাপ নেই</div>
      <div class="empty-sub">+ বাটনে ক্লিক করে অ্যাপ যোগ করুন</div>
    </div>`;
    return;
  }
  appList.innerHTML = data.apps.map(app => `
    <div class="sett-app-item">
      <div class="sett-icon-sm">${iconHtml(app,'sm')}</div>
      <div class="sett-info">
        <div class="sett-name">${escHtml(app.name)}</div>
        <div class="sett-cat">${escHtml(app.category||'—')}</div>
      </div>
      <div class="sett-actions">
        <button class="icon-btn" onclick="editApp('${app.id}')">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn del" onclick="deleteApp('${app.id}')">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

/* ─── Category actions ─── */
function addCategory() {
  const val = document.getElementById('newCatInput').value.trim();
  if (!val) return;
  if (data.categories.includes(val)) { showToast('ক্যাটাগরি ইতিমধ্যে আছে'); return; }
  data.categories.push(val);
  save();
  document.getElementById('newCatInput').value = '';
  renderSettings();
  showToast('ক্যাটাগরি যোগ হয়েছে ✓');
}

function deleteCat(cat) {
  const count = data.apps.filter(a => a.category === cat).length;
  if (count > 0 && !confirm(`"${cat}" ক্যাটাগরিতে ${count}টি অ্যাপ আছে। মুছবেন?`)) return;
  data.categories = data.categories.filter(c => c !== cat);
  data.apps.forEach(a => { if (a.category === cat) a.category = ''; });
  save(); renderSettings();
  showToast('ক্যাটাগরি মুছে গেছে');
}

/* ─── App delete ─── */
function deleteApp(id) {
  if (!confirm('এই অ্যাপটি মুছবেন?')) return;
  data.apps = data.apps.filter(a => a.id !== id);
  save(); renderSettings(); renderApps();
  showToast('অ্যাপ মুছে গেছে');
}

/* ─── Modal open/close ─── */
function openModal(prefill) {
  editingId = null;
  currentIconType = 'favicon';
  selectedEmoji = '🚀';
  selectedColor = COLORS[0];
  faviconUrl = '';

  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value = '';
  document.getElementById('faviconStatus').textContent = '';
  document.getElementById('modalTitle').textContent = 'নতুন অ্যাপ যোগ করুন';

  populateCatSelect();
  buildEmojiStrip();
  buildColorStrip();
  setIconType('favicon');
  updateIconPreview();

  document.getElementById('overlay').classList.add('open');
}

function editApp(id) {
  const app = data.apps.find(a => a.id === id);
  if (!app) return;
  editingId = id;
  currentIconType = app.iconType || 'favicon';
  selectedEmoji = app.emoji || '🚀';
  selectedColor = app.color || COLORS[0];
  faviconUrl = app.faviconUrl || '';

  document.getElementById('inp-name').value = app.name || '';
  document.getElementById('inp-url').value = app.url || '';
  document.getElementById('modalTitle').textContent = 'অ্যাপ সম্পাদনা করুন';

  populateCatSelect(app.category);
  buildEmojiStrip();
  buildColorStrip();
  setIconType(currentIconType);
  updateIconPreview();

  if (faviconUrl) {
    const fs = document.getElementById('faviconStatus');
    fs.className = 'favicon-status ok';
    fs.textContent = '✓ Favicon পাওয়া গেছে';
  }

  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

/* ─── Populate category select ─── */
function populateCatSelect(selected) {
  const sel = document.getElementById('inp-cat');
  sel.innerHTML = data.categories.map(c =>
    `<option value="${escHtml(c)}" ${c===selected?'selected':''}>${escHtml(c)}</option>`
  ).join('');
  if (!data.categories.length) sel.innerHTML = '<option value="">ক্যাটাগরি নেই</option>';
}

/* ─── Icon type toggle ─── */
function setIconType(type) {
  currentIconType = type;
  ['favicon','emoji','letter'].forEach(t => {
    document.getElementById('itype-'+t).classList.toggle('active', t===type);
  });
  document.getElementById('emojiSection').style.display = type==='emoji' ? '' : 'none';
  document.getElementById('colorSection').style.display = type==='letter' ? '' : 'none';

  const hint = document.getElementById('iconHint');
  if (type==='favicon') hint.textContent = 'URL দিলে favicon অটো লোড হবে।';
  else if (type==='emoji') hint.textContent = 'নিচ থেকে একটি ইমোজি বেছে নিন।';
  else hint.textContent = 'অ্যাপের প্রথম অক্ষর দিয়ে রঙিন আইকন তৈরি হবে।';

  updateIconPreview();
}

/* ─── Favicon fetch ─── */
let faviconTimer = null;
function onUrlChange(val) {
  clearTimeout(faviconTimer);
  faviconUrl = '';
  const fs = document.getElementById('faviconStatus');
  if (!val.trim()) { fs.textContent = ''; updateIconPreview(); return; }
  fs.className = 'favicon-status'; fs.textContent = '⏳ Favicon খোঁজা হচ্ছে...';
  faviconTimer = setTimeout(() => fetchFavicon(val.trim()), 600);
}

function fetchFavicon(url) {
  const fs = document.getElementById('faviconStatus');
  let domain;
  try {
    domain = new URL(url.startsWith('http') ? url : 'https://'+url).hostname;
  } catch(e) { fs.className='favicon-status err'; fs.textContent='✗ URL ঠিকমতো লিখুন'; return; }

  const gFav = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  const img = new Image();
  img.onload = () => {
    if (img.width > 2) {
      faviconUrl = gFav;
      fs.className='favicon-status ok'; fs.textContent='✓ Favicon পাওয়া গেছে';
    } else {
      faviconUrl = ''; fs.className='favicon-status err'; fs.textContent='Favicon পাওয়া যায়নি';
    }
    updateIconPreview();
  };
  img.onerror = () => {
    faviconUrl = ''; fs.className='favicon-status err'; fs.textContent='Favicon পাওয়া যায়নি';
    updateIconPreview();
  };
  img.src = gFav;
}

/* ─── Emoji strip ─── */
function buildEmojiStrip() {
  document.getElementById('emojiStrip').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="pickEmoji('${e}')">${e}</div>`
  ).join('');
}

function pickEmoji(e) {
  selectedEmoji = e;
  buildEmojiStrip();
  updateIconPreview();
}

/* ─── Color strip ─── */
function buildColorStrip() {
  document.getElementById('colorStrip').innerHTML = COLORS.map(c =>
    `<div class="color-opt ${c===selectedColor?'selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c) {
  selectedColor = c;
  buildColorStrip();
  updateIconPreview();
}

/* ─── Icon preview update ─── */
function updateIconPreview() {
  const name = document.getElementById('inp-name').value || 'A';
  const preview = document.getElementById('iconPreview');
  const mockApp = { name, iconType: currentIconType, emoji: selectedEmoji, color: selectedColor, faviconUrl };
  preview.innerHTML = iconHtml(mockApp);
}

/* Watch name change for letter preview */
document.getElementById('inp-name').addEventListener('input', updateIconPreview);

/* ─── Save app ─── */
function saveApp() {
  const name = document.getElementById('inp-name').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  const cat = document.getElementById('inp-cat').value;

  if (!name) { alert('অ্যাপের নাম দিন'); return; }
  if (!url) { alert('URL দিন'); return; }

  let finalUrl = url;
  if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) finalUrl = 'https://' + finalUrl;

  const appData = {
    id: editingId || genId(),
    name, url: finalUrl,
    category: cat,
    iconType: currentIconType,
    emoji: selectedEmoji,
    color: selectedColor,
    faviconUrl: currentIconType === 'favicon' ? faviconUrl : '',
    createdAt: Date.now()
  };

  if (editingId) {
    const idx = data.apps.findIndex(a => a.id === editingId);
    if (idx !== -1) data.apps[idx] = appData;
  } else {
    data.apps.push(appData);
  }
  save();
  closeModal();
  renderApps();
  if (document.getElementById('panel-settings').classList.contains('active')) renderSettings();
  showToast(editingId ? 'অ্যাপ আপডেট হয়েছে ✓' : 'অ্যাপ যোগ হয়েছে ✓');
  editingId = null;
}

/* ─── Toast ─── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ─── Util ─── */
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── Init ─── */
renderApps();
</script>
</body>
